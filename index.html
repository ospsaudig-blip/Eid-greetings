<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهنئ الاستدامة - بطاقات تهنئة عيد الأضحى المبارك | OSP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajwal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Primary Colors from Brand Book */
            --color-livid: #176B8E;
            --color-teal: #008996;
            --color-bright-blue: #00A9E2;
            --color-deep-blue: #0A1F8F;
            
            /* Secondary Colors from Brand Book */
            --color-vivid-yellow: #FFC429;
            --color-vivid-green: #00CD7D;
            --color-light-gray: #D9D8D6;
            
            /* UI Background and Gradients */
            --bg-gradient: linear-gradient(135deg, #0A1F8F 0%, #176B8E 50%, #008996 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajwal', sans-serif;
        }

        body {
            background: #f4f7f6;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .logo-container svg {
            width: 160px;
            height: auto;
            display: block;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-deep-blue);
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }

        /* Control Panel Styles */
        .control-panel {
            background: #ffffff;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--color-deep-blue);
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 10px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50px;
            height: 4px;
            background: var(--color-teal);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 1rem;
            font-weight: 700;
            color: #444;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: 2px solid var(--color-light-gray);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            color: var(--color-deep-blue);
            font-weight: 500;
        }

        input[type="text"]:focus {
            border-color: var(--color-teal);
            box-shadow: 0 0 0 4px rgba(0, 137, 150, 0.15);
        }

        /* Template Grid Selector */
        .template-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .template-option {
            border: 3px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1 / 1.5;
            background: #eee;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .template-option:hover {
            transform: translateY(-3px);
        }

        .template-option.active {
            border-color: var(--color-vivid-yellow);
            box-shadow: 0 5px 15px rgba(255, 196, 41, 0.4);
        }

        .template-preview-thumb {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* Template Palette Badges */
        #thumb-1 { background: linear-gradient(180deg, #176B8E 0%, #008996 100%); }
        #thumb-2 { background: linear-gradient(180deg, #0A1F8F 0%, #176B8E 100%); }
        #thumb-3 { background: linear-gradient(180deg, #008996 0%, #00CD7D 100%); }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--color-deep-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #06135c;
            box-shadow: 0 5px 15px rgba(10, 31, 143, 0.3);
        }

        .btn-secondary {
            background: var(--color-teal);
            color: white;
        }

        .btn-secondary:hover {
            background: #006b75;
            box-shadow: 0 5px 15px rgba(0, 137, 150, 0.3);
        }

        /* Live Preview Panel */
        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 20px;
        }

        .canvas-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 8px solid white;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .preview-hint {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
        }

        footer {
            margin-top: auto;
            padding: 40px 20px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #777;
            font-weight: 500;
        }
    </style>
</head>

    <div class="main-container">
        
        <div class="control-panel">
            <h2 class="section-title">صمم بطاقتك الخاصة</h2>
            
            <div class="form-group">
                <label for="userName">الاسم الكريم:</label>
                <input type="text" id="userName" placeholder="اكتب اسمك ليظهر على البطاقة..." value="محمد بن ثامر الطيار" autocomplete="off">
            </div>

            <div class="form-group">
                <label>اختر القالب المفضل من هويتنا:</label>
                <div class="template-grid">
                    <div class="template-option active" data-template="1">
                        <div class="template-preview-thumb" id="thumb-1">
                            <span>قالب 1</span>
                            <span>أزرق الاستدامة</span>
                        </div>
                    </div>
                    <div class="template-option" data-template="2">
                        <div class="template-preview-thumb" id="thumb-2">
                            <span>قالب 2</span>
                            <span>الكحلي الداكن</span>
                        </div>
                    </div>
                    <div class="template-option" data-template="3">
                        <div class="template-preview-thumb" id="thumb-3">
                            <span>قالب 3</span>
                            <span>أخضر زاهي</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="downloadBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    تحميل البطاقة بجودة عالية (PNG)
                </button>
            </div>
        </div>

        <div class="preview-panel">
            <div class="canvas-container">
                <canvas id="cardCanvas" width="800" height="1200"></canvas>
            </div>
            <p class="preview-hint">معاينة مباشرة حية تطابق نسق الملصق الرسمي</p>
        </div>
        
    </div>

    <footer>
        <p>© ٢٠٢٦ برنامج استدامة الطلب على البترول (OSP). جميع الحقوق محفوظة.</p>
    </footer>

    <script>
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('userName');
        const downloadBtn = document.getElementById('downloadBtn');
        const templateOptions = document.querySelectorAll('.template-option');

        let currentTemplate = "1";

        // Structured Layout Positioning Constants matching exactly the reference poster structural guidelines
        const designConfig = {
            width: 800,
            height: 1200,
            fonts: {
                title: "bold 44px 'Tajwal', sans-serif",
                subtitle: "500 24px 'Tajwal', sans-serif",
                closing: "bold 26px 'Tajwal', sans-serif",
                name: "bold 28px 'Tajwal', sans-serif",
                role: "500 20px 'Tajwal', sans-serif"
            }
        };

        // Initialize and Bind Control Handlers
        window.addEventListener('load', () => {
            drawCard();
            
            nameInput.addEventListener('input', drawCard);
            
            templateOptions.forEach(opt => {
                opt.addEventListener('click', (e) => {
                    templateOptions.forEach(o => o.classList.remove('active'));
                    const target = e.currentTarget;
                    target.classList.add('active');
                    currentTemplate = target.getAttribute('data-template');
                    drawCard();
                });
            });

            downloadBtn.addEventListener('click', downloadCard);
        });

        // Main Rendering Orchestration Pipeline
        function drawCard() {
            // Clear space
            ctx.clearRect(0, 0, designConfig.width, designConfig.height);

            // 1. Draw Base Structural Cards Background (Proportional to reference poster header/footer split design)
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, designConfig.width, designConfig.height);

            // 2. Render Gradient Header Top Panel Area
            let headerGradient = ctx.createLinearGradient(0, 0, designConfig.width, 400);
            if (currentTemplate === "1") {
                headerGradient.addColorStop(0, '#176B8E'); // Livid
                headerGradient.addColorStop(1, '#008996'); // Teal
            } else if (currentTemplate === "2") {
                headerGradient.addColorStop(0, '#0A1F8F'); // Deep Blue
                headerGradient.addColorStop(1, '#176B8E'); // Livid
            } else {
                headerGradient.addColorStop(0, '#008996'); // Teal
                headerGradient.addColorStop(1, '#00CD7D'); // Vivid Green
            }
            ctx.fillStyle = headerGradient;
            ctx.fillRect(0, 0, designConfig.width, 400);

            // 3. Render Bottom Header Corporate Footer Panel
            let footerGradient = ctx.createLinearGradient(0, 1050, designConfig.width, designConfig.height);
            if (currentTemplate === "1" || currentTemplate === "2") {
                footerGradient.addColorStop(0, '#0A1F8F');
                footerGradient.addColorStop(1, '#008996');
            } else {
                footerGradient.addColorStop(0, '#008996');
                footerGradient.addColorStop(1, '#00CD7D');
            }
            ctx.fillStyle = footerGradient;
            ctx.fillRect(0, 1050, designConfig.width, 150);

            // 4. Render Main Typography (Eid Al-Adha Context translated to match aesthetic tone of reference)
            ctx.textAlign = "right";
            ctx.textBaseline = "middle";
            
            // Primary Hero Heading
            ctx.fillStyle = "#ffffff";
            ctx.font = designConfig.fonts.title;
            ctx.fillText("يسعدنا تواصلكم تهنئتكم!", 730, 130);

            // Sub-context Text
            ctx.font = designConfig.fonts.subtitle;
            ctx.fillText("نهنئ أنفسنا عائلة برنامج استدامة الطلب على البترول بحلول عيد الأضحى المبارك،", 730, 220);
            ctx.fillText("نتمنى لكم أياماً حافلة بالمسرات والنجاح والتميز المستدام.", 730, 270);

            // 5. Build Dynamic Grid Array Configuration mimicking exactly the user frame placements inside the poster layout
            const userMatrix = [
                {x: 600, y: 580}, {x: 400, y: 580}, {x: 200, y: 580},
                {x: 600, y: 880}, {x: 400, y: 880}, {x: 200, y: 880}
            ];

            // Render Each Grid Component Block matching typography hierarchy & dynamic OSP drop border
            userMatrix.forEach((pos) => {
                drawUserAssetFrame(pos.x, pos.y, nameInput.value || "اسم المهنئ هنا");
            });

            // 6. Technical Brand Placement: Render Modern Technical Minimal Social Handles inside Footer Panel Space
            ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
            ctx.font = "bold 18px 'Tajwal', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("OSP_Saudi  |  OSPSaudi", designConfig.width / 2, 1125);
        }

        /**
         * Specialized Custom Native Canvas Arc Renderer that constructs the distinctive 
         * organic shape vector frame from the official logo asset for name frames.
         */
        function drawUserAssetFrame(x, y, rawNameString) {
            ctx.save();
            
            // Base configuration variables
            const scaleFactor = 0.5; 
            
            // Set Color Schemes dynamically according to chosen brand palette template
            let coreBrandColor = '#0A1F8F'; // Deep Blue
            let secondaryBrandColor = '#00CD7D'; // Vivid Green
            let lightBorderColor = '#008996'; // Teal
            
            if (currentTemplate === "2") {
                secondaryBrandColor = '#FFC429'; // Vivid Yellow
                lightBorderColor = '#176B8E';
            } else if (currentTemplate === "3") {
                coreBrandColor = '#008996';
                secondaryBrandColor = '#FFC429';
            }

            // --- Draw the exact Dynamic Outer Organic Frame Drop Shape via Vector Beziers ---
            ctx.translate(x, y - 60);
            ctx.scale(scaleFactor, scaleFactor);
            
            // Mathematical Offset Center adjustment to map local context coordinates natively
            ctx.translate(-730, -280); 

            // Back Drop Base Shadow
            ctx.shadowColor = 'rgba(0, 89, 150, 0.15)';
            ctx.shadowBlur = 30;

            // Outer Drop Arc Path Vector Loop
            ctx.beginPath();
            ctx.moveTo(822.4, 244.5);
            ctx.bezierCurveTo(780.1, 197.8, 721.0, 133.1, 721.0, 133.1);
            ctx.敵 = 0; // Padding safeguard
            ctx.bezierCurveTo(707.2, 147.7, 689.5, 166.6, 689.5, 166.6);
            ctx.bezierCurveTo(645.5, 213.6, 614.2, 262.1, 614.2, 318.3);
            ctx.bezierCurveTo(614.2, 379.7, 646.5, 433.8, 700.2, 457.1);
            ctx.bezierCurveTo(712.4, 462.4, 725.6, 465.3, 739.5, 465.3);
            ctx.bezierCurveTo(766.6, 465.3, 792.3, 454.2, 812.4, 434.5);
            ctx.bezierCurveTo(846.7, 401.0, 855.6, 348.1, 836.5, 303.5);
            ctx.bezierCurveTo(832.7, 295.4, 829.0, 273.1, 822.4, 244.5);
            ctx.closePath();
            ctx.fillStyle = secondaryBrandColor;
            ctx.fill();

            // Inner Offset Accent Vector Loop
            ctx.beginPath();
            ctx.moveTo(814.1, 283.0);
            ctx.bezierCurveTo(776.8, 241.8, 724.6, 184.7, 724.6, 184.7);
            ctx.bezierCurveTo(712.4, 197.6, 696.8, 214.3, 696.8, 214.3);
            ctx.bezierCurveTo(658.0, 255.8, 630.4, 300.1, 630.4, 349.7);
            ctx.bezierCurveTo(630.4, 403.9, 658.9, 451.6, 706.3, 472.2);
            ctx.bezierCurveTo(717.1, 476.9, 728.7, 479.4, 741.0, 479.4);
            ctx.bezierCurveTo(764.9, 479.4, 787.6, 469.6, 805.3, 452.2);
            ctx.bezierCurveTo(835.6, 422.6, 843.4, 376.0, 826.6, 336.6);
            ctx.bezierCurveTo(823.2, 325.7, 819.9, 306.0, 814.1, 283.0);
            ctx.closePath();
            ctx.fillStyle = coreBrandColor;
            ctx.fill();

            // Fill Core Drop Space with Solid Clean Light Gray as temporary placeholder avatar matching reference image template 
            ctx.beginPath();
            ctx.arc(735, 340, 95, 0, Math.PI * 2);
            ctx.fillStyle = '#EAEAEA';
            ctx.fill();
            
            // Stylized graphic abstract icon placeholder indicating user name focus
            ctx.beginPath();
            ctx.arc(735, 320, 35, 0, Math.PI * 2);
            ctx.fillStyle = '#C1C1C1';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(735, 400, 60, Math.PI, 0);
            ctx.fillStyle = '#C1C1C1';
            ctx.fill();

            ctx.restore();

            // --- 7. Typography Layout Rendering (Centered relative to the grid point position) ---
            ctx.textAlign = "center";
            ctx.textBaseline = "top";

            // Draw Rectangular Visual Anchor Badge Accent Bar (Mirrors the little blue square on poster)
            ctx.fillStyle = lightBorderColor;
            ctx.fillRect(x + 75, y + 43, 10, 30);

            // User Dynamic Input Name Text 
            ctx.fillStyle = coreBrandColor;
            ctx.font = designConfig.fonts.name;
            ctx.fillText(rawNameString, x - 10, y + 40);

            // Fixed Professional Corporate Context Secondary Title Tag
            ctx.fillStyle = "#666666";
            ctx.font = designConfig.fonts.role;
            ctx.fillText("عضو عائلة OSP كفاحاً وتميزاً", x, y + 80);
        }

        // Action Trigger: Seamless File Download Download
        function downloadCard() {
            // Force maximum quality state computation 
            const dataUrl = canvas.toDataURL('image/png', 1.0);
            const downloadLink = document.createElement('a');
            
            // Sanitize file naming system
            const profileName = nameInput.value.trim().replace(/\s+/g, '_');
            downloadLink.download = `OSP_Eid_Greeting_${profileName || 'Card'}.png`;
            downloadLink.href = dataUrl;
            
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
